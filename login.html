<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LithoAI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            background: white;
            border-radius: 32px;
            width: 450px;
            max-width: 90%;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .auth-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 32px;
            text-align: center;
        }
        
        .auth-header i {
            font-size: 56px;
            margin-bottom: 16px;
            color: #3b82f6;
        }
        
        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .auth-body {
            padding: 32px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: #0f172a;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .auth-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-1px);
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .success-message {
            background: #dcfce7;
            color: #059669;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-microscope"></i>
            <h1>LithoAI</h1>
            <p>Drilling Cuttings Classification System</p>
        </div>
        
        <div class="auth-body">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Sign Up</button>
            </div>
            
            <div id="loginTab" class="tab-content active">
                <div id="loginError" class="error-message" style="display: none;"></div>
                <input type="text" id="loginUsername" placeholder="Username" class="auth-input">
                <input type="password" id="loginPassword" placeholder="Password" class="auth-input">
                <button class="btn-primary" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
            
            <div id="registerTab" class="tab-content">
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div id="registerSuccess" class="success-message" style="display: none;"></div>
                <input type="text" id="regUsername" placeholder="Username" class="auth-input">
                <input type="email" id="regEmail" placeholder="Email" class="auth-input">
                <input type="password" id="regPassword" placeholder="Password (min 4 characters)" class="auth-input">
                <button class="btn-primary" onclick="handleRegister()">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </div>
        </div>
    </div>
    
    <script>
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.style.display = 'none';
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter username and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('lithoai_user', JSON.stringify({
                        username: data.username,
                        user_id: data.user_id
                    }));
                    // window.location.href = 'index.html';
                    window.location.href = '/app';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Make sure Flask is running.';
                errorDiv.style.display = 'block';
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!username || !email || !password) {
                errorDiv.textContent = 'All fields are required';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.textContent = 'Password must be at least 4 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = data.message || 'Account created! Please login.';
                    successDiv.style.display = 'block';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    setTimeout(() => {
                        showTab('login');
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Make sure Flask is running.';
                errorDiv.style.display = 'block';
            }
        }
        
        function showTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
            
            // Clear errors
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        }
        
        // Check if already logged in
        async function checkAlreadyLoggedIn() {
            try {
                const response = await fetch('/api/check_auth');
                const data = await response.json();
                if (data.authenticated) {
                    // window.location.href = 'index.html';
                    window.location.href = '/app';
                }
            } catch (e) {}
        }
        
        checkAlreadyLoggedIn();
    </script>
</body>
</html>
